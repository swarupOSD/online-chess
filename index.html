<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Chess - Play Chess Online, vs AI, or Locally</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Theme Preference Loader (Prevents Flash/Flicker) -->
  <script>
    (function() {
      const theme = localStorage.getItem('chess_theme') || 'dark';
      if (theme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
      const boardStyle = localStorage.getItem('chess_board_style') || 'emerald';
      if (boardStyle !== 'emerald') {
        document.documentElement.classList.add('board-' + boardStyle);
      }
    })();
  </script>
  <style>
    .lobby-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .color-icon {
      font-size: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="lobby-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          
          <div class="text-center mb-4 lobby-header">
            <div class="d-inline-block p-3 mb-3 glass-card rounded-circle">
              <svg width="48" height="48" viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.5 36h28v-3h-28v3zm3-3h22v-3h-22v3zm11-19.5V8M20 11h5" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
                <path d="M11.5 30c2.5-3 5-4.5 11-4.5s8.5 1.5 11 4.5h-22z" fill="#1e293b" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
                <path d="M11.5 30C15 24 17 18 22.5 18S30 24 33.5 30h-22z" fill="#2ecc71" fill-opacity="0.2" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <h1 class="display-6">Antigravity Chess</h1>
            <p class="text-secondary">Play online, test your skills against AI, or play local offline</p>
          </div>

          <!-- Alert container -->
          <div id="alert-container"></div>

          <!-- Glass Card Lobby Panel -->
          <div class="glass-container p-4 p-sm-5">
            <form id="lobby-form" onsubmit="return false;">
              
              <!-- Segmented Game Mode Selector -->
              <div class="mb-4">
                <label class="form-label text-secondary fw-semibold">Game Mode</label>
                <div class="btn-group w-100" role="group" aria-label="Chess Game Mode">
                  <input type="radio" class="btn-check" name="game-mode" id="mode-online" value="online" checked autocomplete="off">
                  <label class="btn btn-outline-success border-opacity-25 py-2.5" for="mode-online">
                    <i class="bi bi-globe2 me-1"></i> Online
                  </label>

                  <input type="radio" class="btn-check" name="game-mode" id="mode-ai" value="ai" autocomplete="off">
                  <label class="btn btn-outline-success border-opacity-25 py-2.5" for="mode-ai">
                    <i class="bi bi-robot me-1"></i> vs AI
                  </label>

                  <input type="radio" class="btn-check" name="game-mode" id="mode-local" value="local" autocomplete="off">
                  <label class="btn btn-outline-success border-opacity-25 py-2.5" for="mode-local">
                    <i class="bi bi-phone me-1"></i> Local
                  </label>
                </div>
              </div>

              <!-- Nickname Input (Hidden in Local mode) -->
              <div class="mb-4" id="nickname-section">
                <label for="username" class="form-label text-secondary fw-semibold">Nickname</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person-fill"></i></span>
                  <input type="text" id="username" class="form-control bg-dark border-secondary text-white p-2.5" placeholder="Enter your name" required maxlength="15">
                </div>
              </div>

              <!-- Color Preference Selector (Hidden in Local mode) -->
              <div class="mb-4" id="color-section">
                <label class="form-label text-secondary fw-semibold">Preferred Side</label>
                <div class="row g-2 text-center">
                  <div class="col-4">
                    <div class="color-option selected" data-color="white" id="color-white">
                      <div class="color-icon text-white"><i class="bi bi-circle-fill"></i></div>
                      <span class="small text-white">White</span>
                    </div>
                  </div>
                  <div class="col-4">
                    <div class="color-option" data-color="random" id="color-random">
                      <div class="color-icon text-secondary"><i class="bi bi-question-circle-fill"></i></div>
                      <span class="small text-secondary">Random</span>
                    </div>
                  </div>
                  <div class="col-4">
                    <div class="color-option" data-color="black" id="color-black">
                      <div class="color-icon text-dark"><i class="bi bi-circle-fill"></i></div>
                      <span class="small text-secondary">Black</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Time Control Select (Shared across modes) -->
              <div class="mb-4" id="timer-section">
                <label for="time-control" class="form-label text-secondary fw-semibold">Time Control</label>
                <select id="time-control" class="form-select bg-dark border-secondary text-white p-2.5">
                  <option value="60">1 Min (Bullet)</option>
                  <option value="180">3 Min (Blitz)</option>
                  <option value="300">5 Min (Blitz)</option>
                  <option value="600" selected>10 Min (Rapid)</option>
                  <option value="900">15 Min (Rapid)</option>
                  <option value="1800">30 Min (Classical)</option>
                  <option value="0">Unlimited (Casual)</option>
                </select>
              </div>

              <hr class="my-4 border-secondary opacity-25">

              <!-- Dynamic Action Button Sections -->
              
              <!-- 1. Online Actions Section -->
              <div id="section-online" class="d-grid gap-3">
                <button type="button" id="btn-create" class="btn btn-glass-primary py-3">
                  <i class="bi bi-plus-circle-fill me-2"></i> Create Game Room
                </button>
                <div class="text-center text-secondary small my-1">
                  <span>- OR JOIN AN EXISTING ONE -</span>
                </div>
                <div class="input-group">
                  <input type="text" id="room-code" class="form-control bg-dark border-secondary text-white text-center p-3" placeholder="Enter 6-digit room code" maxlength="6">
                  <button type="button" id="btn-join" class="btn btn-glass px-4 border-secondary">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Join
                  </button>
                </div>
                <div class="text-center text-secondary small my-1">
                  <span>- OR SPECTATE A LIVE MATCH -</span>
                </div>
                <div class="input-group">
                  <input type="text" id="spectate-room-code" class="form-control bg-dark border-secondary text-white text-center p-3" placeholder="Enter 6-digit room code" maxlength="6">
                  <button type="button" id="btn-spectate" class="btn btn-glass px-4 border-secondary text-info border-info border-opacity-25">
                    <i class="bi bi-eye-fill me-1"></i> Spectate
                  </button>
                </div>
              </div>

              <!-- 2. AI Actions Section (Hidden by default) -->
              <div id="section-ai" class="d-grid gap-2 d-none">
                <button type="button" id="btn-start-ai" class="btn btn-glass-primary py-3">
                  <i class="bi bi-robot me-2"></i> Start AI Match
                </button>
              </div>

              <!-- 3. Local Actions Section (Hidden by default) -->
              <div id="section-local" class="d-grid gap-2 d-none">
                <button type="button" id="btn-start-local" class="btn btn-glass-primary py-3">
                  <i class="bi bi-play-fill me-2"></i> Start Local Match
                </button>
              </div>

            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Custom Scripts -->
  <script>
    // Game Mode Toggling Logic
    const gameModeInputs = document.querySelectorAll('input[name="game-mode"]');
    const nicknameSection = document.getElementById('nickname-section');
    const colorSection = document.getElementById('color-section');
    const timerSection = document.getElementById('timer-section');
    const sectionOnline = document.getElementById('section-online');
    const sectionAi = document.getElementById('section-ai');
    const sectionLocal = document.getElementById('section-local');

    gameModeInputs.forEach(input => {
      input.addEventListener('change', (e) => {
        const mode = e.target.value;
        
        // Hide all actions first
        sectionOnline.classList.add('d-none');
        sectionAi.classList.add('d-none');
        sectionLocal.classList.add('d-none');

        // Show sections based on mode
        if (mode === 'online') {
          nicknameSection.classList.remove('d-none');
          colorSection.classList.remove('d-none');
          timerSection.classList.remove('d-none');
          sectionOnline.classList.remove('d-none');
        } else if (mode === 'ai') {
          nicknameSection.classList.remove('d-none');
          colorSection.classList.remove('d-none');
          timerSection.classList.remove('d-none');
          sectionAi.classList.remove('d-none');
        } else if (mode === 'local') {
          // Local play doesn't need nicknames or colors since it's shared screen
          nicknameSection.classList.add('d-none');
          colorSection.classList.add('d-none');
          timerSection.classList.remove('d-none'); // Timers are optional but supported
          sectionLocal.classList.remove('d-none');
        }
      });
    });

    // Color Selection Behavior
    let selectedColor = 'white';
    const colorOptions = document.querySelectorAll('.color-option');
    colorOptions.forEach(option => {
      option.addEventListener('click', () => {
        colorOptions.forEach(opt => {
          opt.classList.remove('selected');
          opt.querySelector('span').classList.replace('text-white', 'text-secondary');
        });
        option.classList.add('selected');
        option.querySelector('span').classList.replace('text-secondary', 'text-white');
        selectedColor = option.dataset.color;
      });
    });

    // Load saved name
    const usernameInput = document.getElementById('username');
    const savedName = localStorage.getItem('chess_username');
    if (savedName) {
      usernameInput.value = savedName;
    }

    // Helper to generate alerts
    function showAlert(message, type = 'danger') {
      const alertContainer = document.getElementById('alert-container');
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show border-0 text-white bg-danger bg-opacity-75" role="alert" style="backdrop-filter: blur(5px);">
          <i class="bi bi-exclamation-triangle-fill me-2"></i> ${message}
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
    }

    // Handle Create Online Room
    document.getElementById('btn-create').addEventListener('click', () => {
      const username = usernameInput.value.trim();
      if (!username) {
        showAlert('Please enter your nickname first!');
        usernameInput.focus();
        return;
      }
      localStorage.setItem('chess_username', username);
      const timeLimit = document.getElementById('time-control').value;
      window.location.href = `game.html?mode=online&action=create&name=${encodeURIComponent(username)}&color=${selectedColor}&time=${timeLimit}`;
    });

    // Handle Join Online Room
    document.getElementById('btn-join').addEventListener('click', () => {
      const username = usernameInput.value.trim();
      if (!username) {
        showAlert('Please enter your nickname first!');
        usernameInput.focus();
        return;
      }
      const code = document.getElementById('room-code').value.trim().toUpperCase();
      if (!code || code.length !== 6) {
        showAlert('Please enter a valid 6-digit room code!');
        document.getElementById('room-code').focus();
        return;
      }
      localStorage.setItem('chess_username', username);
      window.location.href = `game.html?mode=online&action=join&name=${encodeURIComponent(username)}&room=${code}`;
    });

    // Handle Spectate Online Room
    document.getElementById('btn-spectate').addEventListener('click', () => {
      const username = usernameInput.value.trim() || 'Spectator';
      const code = document.getElementById('spectate-room-code').value.trim().toUpperCase();
      if (!code || code.length !== 6) {
        showAlert('Please enter a valid 6-digit room code to spectate!');
        document.getElementById('spectate-room-code').focus();
        return;
      }
      localStorage.setItem('chess_username', username);
      window.location.href = `game.html?mode=online&action=spectate&name=${encodeURIComponent(username)}&room=${code}`;
    });

    // Handle AI Start
    document.getElementById('btn-start-ai').addEventListener('click', () => {
      const username = usernameInput.value.trim() || 'Player';
      localStorage.setItem('chess_username', username);
      const timeLimit = document.getElementById('time-control').value;
      window.location.href = `game.html?mode=ai&name=${encodeURIComponent(username)}&color=${selectedColor}&time=${timeLimit}`;
    });

    // Handle Local Start
    document.getElementById('btn-start-local').addEventListener('click', () => {
      const timeLimit = document.getElementById('time-control').value;
      window.location.href = `game.html?mode=local&time=${timeLimit}`;
    });

    // Check for query parameters for errors
    const urlParams = new URLSearchParams(window.location.search);
    const errorMsg = urlParams.get('error');
    if (errorMsg) {
      showAlert(errorMsg);
    }
    
    const roomParam = urlParams.get('room');
    if (roomParam) {
      document.getElementById('room-code').value = roomParam.substring(0, 6);
    }
  </script>
  <!-- Bootstrap JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
